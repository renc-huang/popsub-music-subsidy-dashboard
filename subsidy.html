define({id: "d16e28d6", inputs: ["dark","FileAttachment"], outputs: ["psColors","c","data"], body: async (dark,FileAttachment) => {
const {psColors} = await import("./_import/components/theme.853ed63d.js");
const c = psColors(dark);
const data = await FileAttachment("./data/subsidy_clean.csv").csv({typed: true});
return {psColors,c,data};
}});

define({id: "e7cb19dd", inputs: ["data"], outputs: ["years","areas"], body: (data) => {
const years = [...new Set(data.map(d => d.fiscal_year))].filter(Boolean).sort((a, b) => b - a);
const areas = [...new Set(data.map(d => d.subsidy_area))].filter(Boolean).sort();
return {years,areas};
}});

define({id: "f50fef98", inputs: ["view","Inputs","years","areas"], outputs: ["selectedYear","selectedArea"], body: (view,Inputs,years,areas) => {
const selectedYear = view(Inputs.select([null, ...years], {
  label: "年度",
  format: d => d ? `${d} 年` : "全部年度",
  value: null
}));
const selectedArea = view(Inputs.select([null, ...areas], {
  label: "補助業務",
  format: d => d || "全部業務",
  value: null
}));
return {selectedYear,selectedArea};
}});

define({id: "81d83948", inputs: ["data","selectedArea","view","Inputs"], outputs: ["programsForArea","selectedProgram"], body: (data,selectedArea,view,Inputs) => {
// Level 2：依已選 Level 1 動態篩選補助作業
const programsForArea = [...new Set(
  data
    .filter(d => !selectedArea || d.subsidy_area === selectedArea)
    .map(d => d.subsidy_program)
)].filter(Boolean).sort();

const selectedProgram = view(Inputs.select([null, ...programsForArea], {
  label: "補助作業",
  format: d => d || "全部作業",
  value: null
}));
return {programsForArea,selectedProgram};
}});

define({id: "0963fc82", inputs: ["data","selectedArea","selectedProgram","view","Inputs"], outputs: ["subtypesForProgram","selectedSubtype","searchText"], body: (data,selectedArea,selectedProgram,view,Inputs) => {
// Level 3：依已選 Level 2 動態篩選子分類
const subtypesForProgram = [...new Set(
  data
    .filter(d => !selectedArea || d.subsidy_area === selectedArea)
    .filter(d => !selectedProgram || d.subsidy_program === selectedProgram)
    .map(d => d.subsidy_subtype)
)].filter(Boolean).sort();

const selectedSubtype = view(Inputs.select(
  subtypesForProgram.length > 0 ? [null, ...subtypesForProgram] : [null],
  {
    label: "子分類",
    format: d => d || "全部子分類",
    value: null,
    disabled: subtypesForProgram.length === 0
  }
));

const searchText = view(Inputs.text({
  label: "搜尋（受補助者/案件名稱）",
  placeholder: "輸入關鍵字…",
  width: 300
}));
return {subtypesForProgram,selectedSubtype,searchText};
}});

define({id: "3527d93b", inputs: ["data","selectedYear","selectedArea","selectedProgram","selectedSubtype","searchText"], outputs: ["filtered"], body: (data,selectedYear,selectedArea,selectedProgram,selectedSubtype,searchText) => {
const filtered = data.filter(d => {
  if (selectedYear && d.fiscal_year !== selectedYear) return false;
  if (selectedArea && d.subsidy_area !== selectedArea) return false;
  if (selectedProgram && d.subsidy_program !== selectedProgram) return false;
  if (selectedSubtype && d.subsidy_subtype !== selectedSubtype) return false;
  if (searchText) {
    const q = searchText.toLowerCase();
    const name = (d.recipient || "").toLowerCase();
    const title = (d.project_title || "").toLowerCase();
    if (!name.includes(q) && !title.includes(q)) return false;
  }
  return true;
});
return {filtered};
}});

display(await(
filtered.length.toLocaleString()
))
}});

define({id: "5dc94282", mode: "inline", inputs: ["d3","filtered","display"], body: async (d3,filtered,display) => {
display(await(
(d3.sum(filtered, d => d.amount_twd) / 1e8).toFixed(2)
))
}});

define({id: "591c789f", mode: "inline", inputs: ["filtered","display"], body: async (filtered,display) => {
display(await(
new Set(filtered.map(d => d.recipient)).size.toLocaleString()
))
}});

define({id: "9909ca2c", inputs: ["d3","filtered"], outputs: ["byYear"], body: (d3,filtered) => {
const byYear = d3.rollups(filtered, v => d3.sum(v, d => d.amount_twd), d => d.fiscal_year)
  .map(([year, total]) => ({year, total})).sort((a, b) => a.year - b.year);
return {byYear};
}});

define({id: "f953bf57", inputs: ["Plot","width","byYear","c","display"], body: async (Plot,width,byYear,c,display) => {
display(await(
Plot.plot({
  width,
  height: 350,
  x: {label: "年度", tickFormat: d => `${d}`},
  y: {label: "金額（億元）", grid: true, transform: d => d / 1e8, tickFormat: d => d.toFixed(1)},
  marks: [
    Plot.barY(byYear, {x: "year", y: "total", fill: c.budget, tip: true}),
    Plot.ruleY([0]),
  ]
})

define({id: "756944c1", inputs: ["d3","filtered"], outputs: ["byArea"], body: (d3,filtered) => {
const byArea = d3.rollups(filtered, v => d3.sum(v, d => d.amount_twd), d => d.subsidy_area)
  .map(([area, total]) => ({area, total}))
  .sort((a, b) => b.total - a.total);
return {byArea};
}});

define({id: "a88a6f4a", inputs: ["Plot","width","byArea","c","display"], body: async (Plot,width,byArea,c,display) => {
display(await(
Plot.plot({
  width,
  height: 300,
  marginLeft: 120,

    Plot.ruleX([0]),
  ]
})
))
}});

define({id: "3edde093", inputs: ["d3","filtered"], outputs: ["topRecipients"], body: (d3,filtered) => {
const topRecipients = d3.rollups(filtered, v => d3.sum(v, d => d.amount_twd), d => d.recipient)
  .map(([name, total]) => ({name, total}))

}});

    Plot.ruleX([0]),
  ]
})
))

define({id: "4cb3f446", inputs: ["Inputs","filtered","display"], body: async (Inputs,filtered,display) => {
